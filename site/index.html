<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>My Bookshelves</title>
    <meta name="description" content="A curated personal library of technical books and resources.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <style>
        /* ═══════════════════════════════════════════════════
   APPLE-STYLE DESIGN SYSTEM — Zero Dependencies
   System fonts · Inline SVG · Pure CSS
   ═══════════════════════════════════════════════════ */

        /* === Reset & Base === */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #000000;
            --bg-elevated: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-tertiary: #6e6e73;
            --accent: #2997ff;
            --accent-hover: #0077ed;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.16);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 8px 30px rgba(0, 0, 0, 0.6);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --glass: rgba(28, 28, 30, 0.72);
            --glass-border: rgba(255, 255, 255, 0.06);
            --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            --sidebar-w: clamp(260px, 18vw, 340px);
            --nav-h: 48px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* === Light Theme === */
        [data-theme="light"] {
            --bg: #ffffff;
            --bg-elevated: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #d2d2d7;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-tertiary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: rgba(0, 0, 0, 0.08);
            --border-hover: rgba(0, 0, 0, 0.15);
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
            --glass: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(0, 0, 0, 0.06);
        }

        [data-theme="light"] .shimmer {
            background: linear-gradient(90deg, #f5f5f7 0%, #e8e8ed 50%, #f5f5f7 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.47059;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden
        }

        /* === Scrollbar (minimal) === */
        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 2px
        }

        /* ═══════════════════════════════
   NAVBAR — Apple Frosted Glass
   ═══════════════════════════════ */
        .nav {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            height: var(--nav-h);
            max-width: calc(100% - clamp(24px, 4vw, 48px));
            width: fit-content;
            background: var(--glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 9999px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

        .nav-inner {
            max-width: 2560px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 clamp(20px, 3vw, 28px);
            gap: 16px
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            flex-shrink: 0
        }

        .nav-logo svg {
            width: 20px;
            height: 20px;
            opacity: 0.9
        }


        .nav-gh {
            color: var(--text-tertiary);
            transition: color var(--transition);
            display: flex
        }

        .nav-gh:hover {
            color: var(--text-primary)
        }

        .nav-gh svg {
            width: 18px;
            height: 18px
        }

        .nav-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px
        }

        .nav-menu-btn svg {
            width: 20px;
            height: 20px
        }

        /* ═══════════════════════════════
   LAYOUT — Sidebar + Main
   ═══════════════════════════════ */
        .layout {
            display: flex;
            max-width: 2560px;
            margin: 0 auto
        }

        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
            padding: 24px 12px;
            border-right: 1px solid var(--border);
            transition: transform var(--transition), opacity var(--transition)
        }

        .sidebar-heading {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            padding: 0 10px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .sidebar-heading button {
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 10px;
            cursor: pointer;
            font-family: var(--font)
        }

        .sidebar-heading button:hover {
            color: var(--text-secondary)
        }

        /* Sidebar: All Books button */
        .sb-all {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            margin-bottom: 4px;
            transition: background var(--transition), color var(--transition)
        }

        .sb-all:hover {
            background: var(--bg-elevated);
            color: var(--text-primary)
        }

        .sb-all.active {
            background: var(--bg-elevated);
            color: var(--text-primary)
        }

        .sb-all svg {
            width: 14px;
            height: 14px;
            opacity: 0.5
        }

        .sb-all-count {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-tertiary)
        }

        /* Sidebar: Category */
        .sb-cat {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            transition: background var(--transition), color var(--transition)
        }

        .sb-cat:hover {
            background: var(--bg-elevated);
            color: var(--text-primary)
        }

        .sb-cat.active {
            color: var(--text-primary)
        }

        .sb-cat-icon {
            font-size: 14px;
            flex-shrink: 0
        }

        .sb-cat-name {
            flex: 1;
            text-align: left;
            line-height: 1.3
        }

        .sb-cat-count {
            font-size: 11px;
            color: var(--text-tertiary);
            flex-shrink: 0
        }

        .sb-chevron {
            width: 10px;
            height: 10px;
            color: var(--text-tertiary);
            transition: transform 0.2s ease;
            flex-shrink: 0
        }

        .sb-chevron.open, .sb-sub-chevron.open {
            transform: rotate(90deg)
        }

        .sb-sub-chevron {
            width: 8px;
            height: 8px;
            color: var(--text-tertiary);
            transition: transform 0.2s ease;
            flex-shrink: 0;
            margin-right: 2px;
        }

        /* Sidebar: Topics */
        .sb-topics, .sb-subtopics {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .sb-topics {
            padding-left: 12px;
        }
        
        .sb-subtopics {
            padding-left: 20px;
        }

        .sb-topics.open, .sb-subtopics.open {
            max-height: 1000px;
        }

        .sb-topic {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-tertiary);
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.2s ease;
            position: relative
        }

        .sb-topic:hover {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03)
        }

        .sb-topic.active {
            color: var(--accent)
        }

        .sb-topic-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.5
        }

        .sb-topic-name {
            flex: 1;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .sb-topic-count {
            font-size: 10px;
            color: var(--text-tertiary);
            flex-shrink: 0
        }

        /* Category dot colors */
        .dot-1 {
            background: #2997ff
        }

        .dot-2 {
            background: #30d158
        }

        .dot-3 {
            background: #ff9f0a
        }

        .dot-4 {
            background: #ff375f
        }

        .dot-5 {
            background: #bf5af2
        }

        /* Sidebar overlay (mobile) */
        .sb-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 90;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px)
        }

        .sb-overlay.active {
            display: block
        }

        @media(max-width:1199px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                width: 320px;
                min-width: 320px;
                height: 100vh;
                z-index: 100;
                background: var(--glass);
                backdrop-filter: saturate(180%) blur(20px);
                -webkit-backdrop-filter: saturate(180%) blur(20px);
                border-right: 1px solid var(--glass-border);
                box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
                transform: translateX(-100%);
                opacity: 0;
                padding: 24px 16px;
            }

            .sidebar.open {
                transform: translateX(0);
                opacity: 1
            }

            .nav-menu-btn {
                display: flex
            }

            .sb-close-btn {
                display: flex !important;
                background: none;
                border: none;
                color: var(--text-tertiary);
                cursor: pointer;
            }

            /* Larger text in sidebar for touch */
            .sidebar-heading {
                padding: 0 12px 10px;
                font-size: 12px;
            }

            .sb-all {
                padding: 10px 12px;
                font-size: 14px;
                gap: 10px;
                border-radius: 10px;
            }

            .sb-cat {
                padding: 9px 12px;
                font-size: 14px;
                gap: 8px;
                border-radius: 10px;
            }

            .sb-cat-name {
                white-space: normal;
            }

            .sb-topic {
                padding: 7px 12px;
                font-size: 13px;
            }
        }

        /* ═══════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════ */
        .main {
            flex: 1;
            min-width: 0;
            padding: calc(var(--nav-h) + 40px) clamp(12px, 3vw, 24px) 60px
        }

        /* === Search Bar — Apple-style === */
        .search {
            position: relative;
            flex: 1;
            width: 400px;
            max-width: 100%;
            margin: 0 auto;
        }

        .search-input {
            display: block;
            width: 100%;
            flex: 1;
            min-width: 0;
            height: 36px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0 16px 0 38px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: var(--font);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition)
        }

        .search-input::placeholder {
            color: var(--text-tertiary)
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(41, 151, 255, 0.15)
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-tertiary);
            pointer-events: none
        }

        .search-kbd {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-tertiary);
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            transition: opacity 0.2s ease
        }

        /* === Global Search Indicator === */
        .search-input.global-active {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(41, 151, 255, 0.15);
            padding-right: 130px
        }

        .search-global-indicator {
            position: absolute;
            right: 36px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: var(--accent);
            background: rgba(41, 151, 255, 0.1);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            white-space: nowrap
        }

        .search-global-indicator svg {
            width: 10px;
            height: 10px;
            flex-shrink: 0
        }

        .search-global-indicator.visible {
            opacity: 1;
            pointer-events: auto
        }

        .search-clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, background 0.2s ease
        }

        .search-clear-btn svg {
            width: 10px;
            height: 10px
        }

        .search-clear-btn.visible {
            opacity: 1;
            pointer-events: auto
        }

        .search-clear-btn:hover {
            background: var(--accent);
            color: #fff
        }

        /* Hide keyboard hint when global search is active */
        .search-input.global-active ~ .search-kbd {
            opacity: 0;
            pointer-events: none
        }

        /* === Toolbar === */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: clamp(6px, 1vw, 8px);
            margin-bottom: clamp(14px, 2vw, 20px)
        }

        .toolbar-spacer {
            flex: 1
        }

        .book-count {
            font-size: 12px;
            color: var(--text-tertiary)
        }

        /* === Filter Panel — Apple-style === */
        .filter-wrap {
            position: relative;
        }

        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 36px;
            padding: 0 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: var(--font);
            cursor: pointer;
            transition: all var(--transition);
        }

        .filter-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .filter-btn.has-active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .filter-badge {
            display: none;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            line-height: 18px;
            text-align: center;
        }

        .filter-badge.visible {
            display: inline-block;
        }

        .filter-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 800px;
            max-width: 1000px;
            max-height: 480px;
            overflow-y: auto;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-hover);
            padding: 16px;
            z-index: 60;
            opacity: 0;
            transform: translateY(-8px) scale(0.97);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .filter-panel.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .fp-section {
            margin-bottom: 14px;
        }

        .fp-section:last-of-type {
            margin-bottom: 8px;
        }

        .fp-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            margin-bottom: 8px;
            padding: 0 2px;
        }

        .fp-label-count {
            font-size: 9px;
            font-weight: 700;
            background: var(--accent);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            line-height: 14px;
        }

        .fp-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .fp-chip {
            display: inline-flex;
            align-items: center;
            height: 28px;
            padding: 0 11px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-secondary);
            font-size: 11.5px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .fp-chip:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .fp-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .fp-chip.active:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .fp-chip.disabled {
            opacity: 0.3;
            pointer-events: none;
            cursor: default;
        }

        .fp-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            padding: 14px 16px 16px 16px;
            border-top: 1px solid var(--border);
            margin: 10px -16px -16px -16px;
            position: sticky;
            bottom: -16px;
            background: var(--bg-elevated);
            z-index: 10;
        }

        .fp-clear {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .fp-clear:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .fp-apply {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .fp-apply:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .filter-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 55;
        }

        .filter-overlay.active {
            display: block;
        }

        /* ═══════════════════════════════
   BOOK GRID — Apple Card Style (Intrinsic Responsive)
   auto-fill + clamp = no media queries needed
   ═══════════════════════════════ */
        .grid {
            display: grid;
            /* Fluid grid: 150px min (2-col mobile) → 12vw ideal (scales on 4K) → 240px max */
            grid-template-columns: repeat(auto-fill, minmax(clamp(150px, 12vw, 240px), 1fr));
            gap: clamp(12px, 2vw, 24px)
        }

        .card {
            background: var(--bg-elevated);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: transform var(--transition), box-shadow var(--transition);
            border: 1px solid var(--border)
        }

        .card:hover {
            transform: scale(1.03) translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-hover)
        }

        .card-cover {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg-secondary)
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1)
        }

        .card:hover .card-cover img {
            transform: scale(1.06)
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0, 0, 0, 0.7) 100%);
            opacity: 0;
            transition: opacity var(--transition);
            display: flex;
            align-items: flex-end;
            justify-content: center;

        }

        .grid.list-view .skeleton {

            height: 180px;

        }

        }

        /* Apple-style buttons */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            height: 40px;
            padding: 0 20px;
            background: var(--accent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition);

        }

            height: 15px
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 6px;

        }

            height: 15px

        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: none;
            border-radius: 50%;
            background: none;
            color: var(--text-secondary);

            font-weight: 500;
            font-family: var(--font);

            pointer-events: none;

        .toast {

                <svg class="icon-sun" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- ═══ HOME VIEW ═══ -->
    <div id="home-view">
        <!-- ═══ LAYOUT: SIDEBAR + MAIN ═══ -->
        <div class="layout">
            <div id="sb-overlay" class="sb-overlay" onclick="closeSidebar()"></div>

            <!-- SIDEBAR -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-heading">
                    CATEGORIES
                    <div style="display:flex; gap: 12px; align-items: center;">
                        <button onclick="collapseAllCategories()">Collapse</button>
                        <button class="sb-close-btn" onclick="closeSidebar()" title="Close sidebar" style="display:none;">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 14px; height: 14px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </div>
                <button id="sb-all" class="sb-all active" onclick="sidebarSelectAll()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    All Books
                    <span id="sb-all-count" class="sb-all-count">0</span>
                </button>
                <div id="sb-tree"></div>
            </aside>

            <!-- MAIN -->
            <div class="main">
                <!-- Search (Moved to Navbar) -->

                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="filter-wrap">
                        <button id="filter-btn" class="filter-btn" onclick="toggleFilterPanel()" type="button">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                            Filter
                            <span id="filter-badge" class="filter-badge">0</span>
                        </button>
                        <div id="filter-panel" class="filter-panel"></div>
                    </div>
                    <div id="filter-overlay" class="filter-overlay" onclick="closeFilterPanel()"></div>
                    <div class="toolbar-spacer"></div>
                    
                    <div class="layout-toggle">
                        <button id="btn-grid" class="layout-btn active" onclick="setViewMode('grid')" title="Grid View">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                        </button>
                        <button id="btn-list" class="layout-btn" onclick="setViewMode('list')" title="List View">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                    </div>

                    <span class="book-count"><span id="shown-count">0</span> books</span>
                </div>

                <!-- Book Grid -->
                <div id="skeleton" class="grid"></div>
                <div id="grid" class="grid" style="display:none"></div>

                <!-- Pagination -->
                <div id="pagination" class="pagination"></div>

                <!-- No Results -->
                <div id="no-results" class="no-results">
                    <svg class="no-results-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <h3>No books found</h3>
                    <p>Try adjusting your search or filters</p>
                </div>

                <!-- Footer -->
                <div class="footer">Built with ❤ by My Bookshelves</div>
            </div>
        </div>

    </div><!-- /home-view -->

    <!-- ═══ DETAIL VIEW ═══ -->
    <div id="detail-view" style="display:none">
        <div class="detail-view">
            <button class="dv-back" onclick="showHomeView()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Library
            </button>
            <div id="dv-content"></div>
        </div>
    </div>

    <!-- ═══ TOAST ═══ -->
    <div id="toast" class="toast">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span id="toast-msg">Link copied!</span>
    </div>

    <script src="app.js"></script>
</body>

</html>
