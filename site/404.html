<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Bookshelves</title>
    <script>
        (function () {
            var repoBase = "/My-Bookshelves/";
            var route = location.pathname;
            if (route.indexOf(repoBase) === 0) {
                route = route.slice(repoBase.length);
            } else {
                route = route.replace(/^\/+/, "");
            }
            route = route.replace(/\/$/, "");
            var target = repoBase + "?route=" + encodeURIComponent(route);
            if (location.hash) target += location.hash;
            location.replace(target);
        }());
    </script>
</head>
<body>
    <p>Opening My Bookshelves...</p>
</body>
</html>
